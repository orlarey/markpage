<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 560 400"
     width="900"
     font-family="-apple-system, system-ui, sans-serif"
     role="img"
     aria-label="Recto-verso Van de Graaf layout with two nested similar rectangles on the diagonals — text block and enclosing live area. The header and footer bands fit between them; the pure-white canonical margins sit between the live area and the page edges.">
  <title>Mise en page Van de Graaf — deux rectangles imbriqués sur les diagonales</title>
  <desc>
    A4 spread, Van de Graaf canon. Two similar rectangles, both with their four
    corners on the four construction diagonals: the text block (inner, blue) at
    66-char measure, and the live area (outer, green-dashed) that encloses the
    running header and footer. The space between the two rectangles holds the
    header band (top), footer band (bottom), and gutter whitespace (sides). The
    space between the live area and the page edges is the true canonical margin
    — pure white, never inked. Used in SPEC §9.6.
  </desc>

  <style>
    .page          { fill: #fafafa; stroke: #1f1f1f; stroke-width: 0.5; }
    .live-area     { fill: #f0f7ee; stroke: #4a8a44; stroke-width: 0.55; stroke-dasharray: 2.2 1.6; }
    .text-block    { fill: #eaf1ff; stroke: #2c5cd6; stroke-width: 0.6; }
    .header-band   { fill: #fff4e0; opacity: 0.7; }
    .footer-band   { fill: #fff4e0; opacity: 0.7; }
    .gutter        { fill: #f3f6f3; opacity: 0.6; }
    .running-line  { stroke: #b06700; stroke-width: 0.6; }
    .spine         { stroke: #888; stroke-width: 0.45; stroke-dasharray: 2.2 1.6; }
    .blank-mark    { stroke: #aaa; stroke-width: 0.3; stroke-dasharray: 0.8 1.0; }
    .diagonal      { stroke: #b8762a; stroke-width: 0.35; stroke-dasharray: 1.4 1.4; fill: none; opacity: 0.8; }
    .corner-dot    { fill: #b8762a; }

    .t-title       { font-size: 11px; fill: #111; font-weight: 600; text-anchor: middle; }
    .t-sub         { font-size: 6.4px; fill: #555; text-anchor: middle; }
    .t-page        { font-size: 7.5px; fill: #222; font-weight: 600; text-anchor: middle; }
    .t-margin-c    { font-size: 5.4px; fill: #333; font-style: italic; text-anchor: middle; }
    .t-margin      { font-size: 5.4px; fill: #333; font-style: italic; }
    .t-live        { font-size: 5.4px; fill: #2b6f25; font-weight: 600; text-anchor: middle; }
    .t-tb          { font-size: 5.6px; fill: #2c5cd6; font-weight: 600; text-anchor: middle; }
    .t-tb-sub      { font-size: 5px;   fill: #2c5cd6; text-anchor: middle; }
    .t-run         { font-size: 5px; fill: #8a4f00; font-style: italic; text-anchor: middle; }
    .t-spine       { font-size: 5.4px; fill: #777; text-anchor: middle; }
    .t-blank       { font-size: 4.6px; fill: #888; font-style: italic; text-anchor: middle; }
    .t-legend      { font-size: 5.6px; fill: #333; }
    .t-legend-h    { font-size: 6px; fill: #111; font-weight: 600; }
  </style>

  <!-- Title block -->
  <text x="280" y="20" class="t-title">Mise en page Van de Graaf — deux rectangles canoniques imbriqués</text>
  <text x="280" y="32" class="t-sub">A4 · texte à 66 chars (x₂=228) ⊂ live area (x₂=240) · les 8 coins sur les diagonales</text>

  <!--
       Geometric setup (verso, x=45..255):
         Family of canonical rectangles: x2 = top-inner-x parameter.
           top-outer x = 555 − 2·x2
           width       = 3·x2 − 555
           top y       = 50 + (top-outer − 45) · 0.707
           height      = width · 1.414

         Text block at x2_T = 228 (66 chars at 11 pt Source Serif):
           top-outer = (99, 88), bottom-inner = (228, 270), width 129, height 182

         Live area at x2_L = 240 (chosen to leave a comfortable header / footer band):
           top-outer = (75, 71), bottom-inner = (240, 304), width 165, height 233

         Derived bands:
           outer gutter   = 2·(x2_L − x2_T) = 24 mm
           inner gutter   = (x2_L − x2_T)   = 12 mm
           header band    = (top_y_T − top_y_L)         = 17 mm
           footer band    = (bot_y_L − bot_y_T)         = 34 mm
           outer trim     = top-outer_L − page edge      = 30 mm  (pure white)
           binding trim   = page-inner − inner_L         = 15 mm  (pure white)
           top blank      = top_y_L − page-top           = 21 mm  (pure white)
           bottom blank   = page-bottom − bot_y_L        = 43 mm  (pure white)

       Recto mirrors around the spine at x=255.
  -->

  <!-- ====================  Verso (left page, paire)  ==================== -->
  <g id="verso">
    <!-- Page -->
    <rect class="page" x="45" y="50" width="210" height="297"/>

    <!-- Live area (encloses text + header + footer + gutters) -->
    <rect class="live-area" x="75" y="71" width="165" height="233"/>

    <!-- Header band (inside live area, above text block) -->
    <rect class="header-band" x="75" y="71" width="165" height="17"/>
    <!-- Footer band (inside live area, below text block) -->
    <rect class="footer-band" x="75" y="270" width="165" height="34"/>
    <!-- Outer gutter (inside live area, white between live-edge and text-edge) -->
    <rect class="gutter" x="75" y="88" width="24" height="182"/>
    <!-- Inner gutter -->
    <rect class="gutter" x="228" y="88" width="12" height="182"/>

    <!-- Text block -->
    <rect class="text-block" x="99" y="88" width="129" height="182"/>

    <!-- Running header / footer baselines (full width of the live area —
         left | center | right slots align on live-area edges, NOT on text-block) -->
    <line class="running-line" x1="75" y1="77" x2="240" y2="77"/>
    <text x="157.5" y="75" class="t-run">header (full width live area)</text>
    <line class="running-line" x1="75" y1="295" x2="240" y2="295"/>
    <text x="157.5" y="293" class="t-run">footer (full width live area)</text>

    <!-- Margin labels: in/around the bands -->
    <text x="163.5" y="84" class="t-margin-c">header band 17 mm</text>
    <text x="163.5" y="289" class="t-margin-c">footer band 34 mm</text>
    <text x="87"  y="180" class="t-margin"  transform="rotate(-90 87 180)">gutter 24 mm</text>
    <text x="234" y="180" class="t-margin"  transform="rotate(-90 234 180)">gutter 12 mm</text>

    <!-- Live area label -->
    <text x="163.5" y="68" class="t-live">live area canonique  (165 × 233 mm)</text>

    <!-- Pure-white margin labels (true canonical white) -->
    <text x="60"  y="200" class="t-blank" transform="rotate(-90 60 200)">trim ext. 30 mm</text>
    <text x="247" y="200" class="t-blank" transform="rotate(-90 247 200)">reliure 15 mm</text>
    <text x="150" y="62"  class="t-blank">blanc canonique 21 mm</text>
    <text x="150" y="325" class="t-blank">blanc canonique 43 mm</text>

    <!-- Text block annotations -->
    <text x="163.5" y="172" class="t-tb">bloc-texte</text>
    <text x="163.5" y="182" class="t-tb-sub">129 × 182 mm</text>
    <text x="163.5" y="192" class="t-tb-sub">mesure 66 chars</text>

    <!-- Page label -->
    <text x="150" y="375" class="t-page">verso  ·  page paire</text>
  </g>

  <!-- ====================  Spine  ==================== -->
  <line class="spine" x1="255" y1="48" x2="255" y2="349"/>
  <text x="255" y="368" class="t-spine">reliure</text>

  <!-- ====================  Recto (right page, impaire)  ==================== -->
  <g id="recto">
    <!-- Page -->
    <rect class="page" x="255" y="50" width="210" height="297"/>

    <!-- Live area (mirror: inner at x=270, outer at x=435) -->
    <rect class="live-area" x="270" y="71" width="165" height="233"/>

    <!-- Header band -->
    <rect class="header-band" x="270" y="71" width="165" height="17"/>
    <!-- Footer band -->
    <rect class="footer-band" x="270" y="270" width="165" height="34"/>
    <!-- Inner gutter (white between live-inner and text-inner) -->
    <rect class="gutter" x="270" y="88" width="12" height="182"/>
    <!-- Outer gutter -->
    <rect class="gutter" x="411" y="88" width="24" height="182"/>

    <!-- Text block (inner at 282, outer at 411) -->
    <rect class="text-block" x="282" y="88" width="129" height="182"/>

    <!-- Running baselines (full width live area) -->
    <line class="running-line" x1="270" y1="77" x2="435" y2="77"/>
    <text x="352.5" y="75" class="t-run">header (full width live area)</text>
    <line class="running-line" x1="270" y1="295" x2="435" y2="295"/>
    <text x="352.5" y="293" class="t-run">footer (full width live area)</text>

    <!-- Margin labels -->
    <text x="346.5" y="84" class="t-margin-c">header band 17 mm</text>
    <text x="346.5" y="289" class="t-margin-c">footer band 34 mm</text>
    <text x="276" y="180" class="t-margin" transform="rotate(-90 276 180)">gutter 12 mm</text>
    <text x="423" y="180" class="t-margin" transform="rotate(-90 423 180)">gutter 24 mm</text>

    <!-- Live area label -->
    <text x="346.5" y="68" class="t-live">live area canonique  (165 × 233 mm)</text>

    <!-- Pure-white labels -->
    <text x="263" y="200" class="t-blank" transform="rotate(-90 263 200)">reliure 15 mm</text>
    <text x="450" y="200" class="t-blank" transform="rotate(-90 450 200)">trim ext. 30 mm</text>
    <text x="360" y="62"  class="t-blank">blanc canonique 21 mm</text>
    <text x="360" y="325" class="t-blank">blanc canonique 43 mm</text>

    <!-- Text block annotations -->
    <text x="346.5" y="172" class="t-tb">bloc-texte</text>
    <text x="346.5" y="182" class="t-tb-sub">129 × 182 mm</text>
    <text x="346.5" y="192" class="t-tb-sub">mesure 66 chars</text>

    <!-- Page label -->
    <text x="360" y="375" class="t-page">recto  ·  page impaire</text>
  </g>

  <!-- ====================  Van de Graaf diagonals  ==================== -->
  <!--
       Four diagonals. ALL EIGHT corners of the two rectangles (text and live
       area, on each page) sit on one of these four lines:
         1. spread ↘  (45,50)  → (465,347)    — text top-outer + live top-outer (verso)
         2. spread ↙  (465,50) → (45,347)     — same, mirrored on recto
         3. verso int (255,50) → (45,347)     — text top-inner + bottom-outer (verso)
                                                live top-inner + bottom-outer (verso)
         4. recto int (255,50) → (465,347)    — symmetric on recto
  -->
  <g id="diagonals">
    <line class="diagonal" x1="45"  y1="50" x2="465" y2="347"/>
    <line class="diagonal" x1="465" y1="50" x2="45"  y2="347"/>
    <line class="diagonal" x1="255" y1="50" x2="45"  y2="347"/>
    <line class="diagonal" x1="255" y1="50" x2="465" y2="347"/>
  </g>

  <!-- Corner dots — make the 8 canonical corners explicit -->
  <g id="corner-dots">
    <!-- Verso text block corners -->
    <circle class="corner-dot" cx="99"  cy="88"  r="1.0"/>
    <circle class="corner-dot" cx="228" cy="88"  r="1.0"/>
    <circle class="corner-dot" cx="99"  cy="270" r="1.0"/>
    <circle class="corner-dot" cx="228" cy="270" r="1.0"/>
    <!-- Verso live area corners -->
    <circle class="corner-dot" cx="75"  cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="240" cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="75"  cy="304" r="1.2"/>
    <circle class="corner-dot" cx="240" cy="304" r="1.2"/>
    <!-- Recto text block corners -->
    <circle class="corner-dot" cx="282" cy="88"  r="1.0"/>
    <circle class="corner-dot" cx="411" cy="88"  r="1.0"/>
    <circle class="corner-dot" cx="282" cy="270" r="1.0"/>
    <circle class="corner-dot" cx="411" cy="270" r="1.0"/>
    <!-- Recto live area corners -->
    <circle class="corner-dot" cx="270" cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="435" cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="270" cy="304" r="1.2"/>
    <circle class="corner-dot" cx="435" cy="304" r="1.2"/>
  </g>

  <!-- ====================  Legend  ==================== -->
  <g id="legend" transform="translate(478, 70)">
    <text x="0" y="0"  class="t-legend-h">Famille canonique</text>
    <text x="0" y="11" class="t-legend">Tous les rectangles</text>
    <text x="0" y="19" class="t-legend">similaires à la page</text>
    <text x="0" y="27" class="t-legend">dont les 4 coins sont</text>
    <text x="0" y="35" class="t-legend">sur les diagonales.</text>

    <text x="0" y="52" class="t-legend-h">Choix utilisateur</text>
    <text x="0" y="63" class="t-legend">2 membres :</text>
    <text x="0" y="71" class="t-legend">· texte (mesure)</text>
    <text x="0" y="79" class="t-legend">· live area</text>

    <text x="0" y="96" class="t-legend-h">Bandes dérivées</text>
    <text x="0" y="107" class="t-legend">header  17 mm</text>
    <text x="0" y="115" class="t-legend">footer  34 mm</text>
    <text x="0" y="123" class="t-legend">gutter 24 / 12 mm</text>

    <text x="0" y="140" class="t-legend-h">Vrais blancs</text>
    <text x="0" y="151" class="t-legend">entre live area</text>
    <text x="0" y="159" class="t-legend">et bord de page</text>
    <text x="0" y="167" class="t-legend">— jamais d'encre.</text>
  </g>

  <!-- ====================  Swatch legend  ==================== -->
  <g id="swatches" transform="translate(20, 387)">
    <rect width="8" height="6" class="text-block"/>
    <text x="11" y="5" class="t-legend">bloc-texte</text>

    <rect x="62" width="8" height="6" class="live-area"/>
    <text x="73" y="5" class="t-legend">live area canonique</text>

    <rect x="180" width="8" height="6" class="header-band"/>
    <text x="191" y="5" class="t-legend">header / footer band</text>

    <rect x="287" width="8" height="6" class="gutter"/>
    <text x="298" y="5" class="t-legend">gutter blanc int. live</text>

    <line x1="395" y1="0" x2="403" y2="6" class="diagonal"/>
    <text x="406" y="5" class="t-legend">diagonales Van de Graaf</text>
  </g>
</svg>
