<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 560 420"
     width="900"
     font-family="-apple-system, system-ui, sans-serif"
     role="img"
     aria-label="Scholar's margin layout as two nested canonical rectangles on the Van de Graaf diagonals. The text block (narrow, 52-char measure) sits inside an enclosing live area that also contains header, footer, sidenote zone and inner gutter.">
  <title>Marges érudites — texte et live area imbriqués sur les diagonales</title>
  <desc>
    A4 spread, Van de Graaf canon, scholar's margin layout. Same nested-rectangle
    construction as docs/img/recto-verso-layout.svg, but here the live area's
    outer gutter is wide enough (44 mm) to host a sidenote area (38.5 mm)
    plus a 5.5 mm gap to the text block — both derived from the canon
    (gap = innerGutter / 4, sidenote = outerGutter − gap). Header / footer bands are taller because the
    text block is narrower (52 chars instead of 66). All eight corners of the
    two rectangles lie on the four construction diagonals.
  </desc>

  <style>
    .page          { fill: #fafafa; stroke: #1f1f1f; stroke-width: 0.5; }
    .live-area     { fill: #f0f7ee; stroke: #4a8a44; stroke-width: 0.55; stroke-dasharray: 2.2 1.6; }
    .text-block    { fill: #eaf1ff; stroke: #2c5cd6; stroke-width: 0.6; }
    .header-band   { fill: #fff4e0; opacity: 0.7; }
    .footer-band   { fill: #fff4e0; opacity: 0.7; }
    .gutter        { fill: #f3f6f3; opacity: 0.6; }
    .sidenote-area { fill: #f4f0e6; stroke: #8a6f33; stroke-width: 0.4; stroke-dasharray: 1.4 1.0; }
    .sidenote-fig  { fill: #fff7e6; stroke: #8a6f33; stroke-width: 0.4; }
    .running-line  { stroke: #b06700; stroke-width: 0.55; }
    .spine         { stroke: #888; stroke-width: 0.45; stroke-dasharray: 2.2 1.6; }
    .anchor        { stroke: #b06700; stroke-width: 0.5; stroke-dasharray: 0.8 1.0; }
    .diagonal      { stroke: #b8762a; stroke-width: 0.35; stroke-dasharray: 1.4 1.4; fill: none; opacity: 0.8; }
    .corner-dot    { fill: #b8762a; }

    .t-title       { font-size: 11px; fill: #111; font-weight: 600; text-anchor: middle; }
    .t-sub         { font-size: 6.4px; fill: #555; text-anchor: middle; }
    .t-page        { font-size: 7.5px; fill: #222; font-weight: 600; text-anchor: middle; }
    .t-margin      { font-size: 5.4px; fill: #333; font-style: italic; }
    .t-margin-c    { font-size: 5.4px; fill: #333; font-style: italic; text-anchor: middle; }
    .t-live        { font-size: 5.4px; fill: #2b6f25; font-weight: 600; text-anchor: middle; }
    .t-tb          { font-size: 5.6px; fill: #2c5cd6; font-weight: 600; text-anchor: middle; }
    .t-tb-sub      { font-size: 5px;   fill: #2c5cd6; text-anchor: middle; }
    .t-run         { font-size: 5px; fill: #8a4f00; font-style: italic; text-anchor: middle; }
    .t-spine       { font-size: 5.4px; fill: #777; text-anchor: middle; }
    .t-blank       { font-size: 4.6px; fill: #888; font-style: italic; text-anchor: middle; }
    .t-legend      { font-size: 5.6px; fill: #333; }
    .t-legend-h    { font-size: 6px; fill: #111; font-weight: 600; }
    .t-side        { font-size: 4.6px; fill: #8a6f33; font-style: italic; }
    .t-side-mark   { font-size: 5px; fill: #b06700; font-weight: 600; text-anchor: middle; }
    .t-formula     { font-size: 5.4px; fill: #b06700; font-weight: 600; }
  </style>

  <!-- Title block -->
  <text x="280" y="20" class="t-title">Marges érudites — texte et live area imbriqués sur les diagonales</text>
  <text x="280" y="32" class="t-sub">A4 · texte à 52 chars (x₂=218) ⊂ live area (x₂=240) · sidenote dans le gutter extérieur</text>

  <!--
       Geometric setup (verso, x=45..255):
         Text block at x2_T = 218 (52 chars):
           top-outer = (119, 102), bottom-inner = (218, 242), width 99, height 140
         Live area at x2_L = 240 (same as recto-verso-layout.svg):
           top-outer = (75, 71), bottom-inner = (240, 304), width 165, height 233

         Outer gutter width = 2·(x2_L − x2_T) = 44 mm
           → split into sidenote (38.5 mm) + gap (5.5 mm)
             where gap = innerGutter / 4 (also derived from the canon)
         Inner gutter        = (x2_L − x2_T)   = 22 mm

         Bands (smaller text → wider bands than recto-verso-layout):
           header  31 mm
           footer  62 mm
  -->

  <!-- ====================  Verso (left page, paire)  ==================== -->
  <g id="verso">
    <!-- Page -->
    <rect class="page" x="45" y="50" width="210" height="297"/>

    <!-- Live area -->
    <rect class="live-area" x="75" y="71" width="165" height="233"/>

    <!-- Header band -->
    <rect class="header-band" x="75" y="71" width="165" height="31"/>
    <!-- Footer band -->
    <rect class="footer-band" x="75" y="242" width="165" height="62"/>
    <!-- Inner gutter (white) -->
    <rect class="gutter" x="218" y="102" width="22" height="140"/>

    <!--
         Outer gutter (44 mm wide on verso = sidenote 38.5 + gap 5.5):
         Sidenote area: x = 75..114, gap = 114..119 (gap stays plain page).
    -->
    <rect class="sidenote-area" x="75" y="102" width="39" height="140"/>

    <!-- Sample sidenote text blocks -->
    <text x="78" y="115" class="t-side"><tspan>1. La première note, en</tspan></text>
    <text x="78" y="121" class="t-side"><tspan>corps réduit (0.85 em),</tspan></text>
    <text x="78" y="127" class="t-side"><tspan>alignée à hauteur</tspan></text>
    <text x="78" y="133" class="t-side"><tspan>de son ancre.</tspan></text>

    <text x="78" y="165" class="t-side"><tspan>2. Le commentaire</tspan></text>
    <text x="78" y="171" class="t-side"><tspan>latéral n'interrompt</tspan></text>
    <text x="78" y="177" class="t-side"><tspan>pas la lecture.</tspan></text>

    <!-- Sample margin figure -->
    <rect class="sidenote-fig" x="79" y="200" width="33" height="22"/>
    <text x="95.5" y="213" class="t-side" text-anchor="middle">[figure]</text>
    <text x="79" y="234" class="t-side"><tspan>Fig. 1 — caption</tspan></text>

    <!-- Text block -->
    <rect class="text-block" x="119" y="102" width="99" height="140"/>

    <!-- Anchor markers inside text block -->
    <line class="anchor" x1="114" y1="125" x2="121" y2="125"/>
    <text x="123" y="127" class="t-side-mark">¹</text>
    <line class="anchor" x1="114" y1="170" x2="121" y2="170"/>
    <text x="123" y="172" class="t-side-mark">²</text>
    <line class="anchor" x1="114" y1="215" x2="121" y2="215"/>
    <text x="123" y="217" class="t-side-mark">³</text>

    <!-- Running header / footer baselines (inside live area) -->
    <line class="running-line" x1="75" y1="83" x2="240" y2="83"/>
    <text x="157.5" y="81" class="t-run">header (full width live area)</text>
    <line class="running-line" x1="75" y1="293" x2="240" y2="293"/>
    <text x="157.5" y="291" class="t-run">footer (full width live area)</text>

    <!-- Band labels -->
    <text x="167" y="95" class="t-margin-c">header band 31 mm</text>
    <text x="167" y="287" class="t-margin-c">footer band 62 mm</text>
    <text x="229" y="172" class="t-margin" transform="rotate(-90 229 172)">gutter 22</text>

    <!-- Live area label -->
    <text x="157.5" y="68" class="t-live">live area canonique  (165 × 233 mm)</text>

    <!-- Pure-white labels -->
    <text x="60"  y="200" class="t-blank" transform="rotate(-90 60 200)">trim ext. 30 mm</text>
    <text x="247" y="200" class="t-blank" transform="rotate(-90 247 200)">reliure 15 mm</text>
    <text x="150" y="62"  class="t-blank">blanc canonique 21 mm</text>
    <text x="150" y="325" class="t-blank">blanc canonique 43 mm</text>

    <!-- Text block annotations -->
    <text x="168.5" y="170" class="t-tb">bloc-texte</text>
    <text x="168.5" y="180" class="t-tb-sub">99 × 140 mm</text>
    <text x="168.5" y="190" class="t-tb-sub">mesure 52 chars</text>

    <!-- Page label -->
    <text x="150" y="378" class="t-page">verso  ·  page paire</text>
  </g>

  <!-- ====================  Spine  ==================== -->
  <line class="spine" x1="255" y1="48" x2="255" y2="349"/>
  <text x="255" y="368" class="t-spine">reliure</text>

  <!-- ====================  Recto (right page, impaire)  ==================== -->
  <g id="recto">
    <!-- Page -->
    <rect class="page" x="255" y="50" width="210" height="297"/>

    <!-- Live area (inner at 270, outer at 435) -->
    <rect class="live-area" x="270" y="71" width="165" height="233"/>

    <!-- Header / footer bands -->
    <rect class="header-band" x="270" y="71" width="165" height="31"/>
    <rect class="footer-band" x="270" y="242" width="165" height="62"/>
    <!-- Inner gutter (white, near spine, between live-inner and text-inner) -->
    <rect class="gutter" x="270" y="102" width="22" height="140"/>

    <!-- Sidenote area on the outer side of recto (right):
         text outer at 391, then 5.5 mm gap, then sidenote 38.5 mm to live-outer 435 -->
    <rect class="sidenote-area" x="396" y="102" width="39" height="140"/>

    <!-- Sample sidenote text -->
    <text x="399" y="120" class="t-side"><tspan>1. Note attachée au</tspan></text>
    <text x="399" y="126" class="t-side"><tspan>texte de la page recto,</tspan></text>
    <text x="399" y="132" class="t-side"><tspan>alignée à hauteur</tspan></text>
    <text x="399" y="138" class="t-side"><tspan>de son ancre.</tspan></text>

    <text x="399" y="170" class="t-side"><tspan>2. Le flux principal</tspan></text>
    <text x="399" y="176" class="t-side"><tspan>n'est pas interrompu.</tspan></text>

    <!-- Sample margin figure -->
    <rect class="sidenote-fig" x="400" y="200" width="33" height="22"/>
    <text x="416.5" y="213" class="t-side" text-anchor="middle">[figure]</text>
    <text x="400" y="234" class="t-side"><tspan>Fig. 2 — caption</tspan></text>

    <!-- Text block (inner at 292, outer at 391) -->
    <rect class="text-block" x="292" y="102" width="99" height="140"/>

    <!-- Anchor markers -->
    <line class="anchor" x1="389" y1="125" x2="396" y2="125"/>
    <text x="387" y="127" class="t-side-mark">¹</text>
    <line class="anchor" x1="389" y1="170" x2="396" y2="170"/>
    <text x="387" y="172" class="t-side-mark">²</text>
    <line class="anchor" x1="389" y1="215" x2="396" y2="215"/>
    <text x="387" y="217" class="t-side-mark">³</text>

    <!-- Running baselines -->
    <line class="running-line" x1="270" y1="83" x2="435" y2="83"/>
    <text x="352.5" y="81" class="t-run">header (full width live area)</text>
    <line class="running-line" x1="270" y1="293" x2="435" y2="293"/>
    <text x="352.5" y="291" class="t-run">footer (full width live area)</text>

    <!-- Band labels -->
    <text x="341.5" y="95" class="t-margin-c">header band 31 mm</text>
    <text x="341.5" y="287" class="t-margin-c">footer band 62 mm</text>
    <text x="281" y="172" class="t-margin" transform="rotate(-90 281 172)">gutter 22</text>

    <!-- Live area label -->
    <text x="352.5" y="68" class="t-live">live area canonique  (165 × 233 mm)</text>

    <!-- Pure-white labels -->
    <text x="263" y="200" class="t-blank" transform="rotate(-90 263 200)">reliure 15 mm</text>
    <text x="450" y="200" class="t-blank" transform="rotate(-90 450 200)">trim ext. 30 mm</text>
    <text x="360" y="62"  class="t-blank">blanc canonique 21 mm</text>
    <text x="360" y="325" class="t-blank">blanc canonique 43 mm</text>

    <!-- Text block annotations -->
    <text x="341.5" y="170" class="t-tb">bloc-texte</text>
    <text x="341.5" y="180" class="t-tb-sub">99 × 140 mm</text>
    <text x="341.5" y="190" class="t-tb-sub">mesure 52 chars</text>

    <!-- Page label -->
    <text x="360" y="378" class="t-page">recto  ·  page impaire</text>
  </g>

  <!-- ====================  Van de Graaf diagonals  ==================== -->
  <g id="diagonals">
    <line class="diagonal" x1="45"  y1="50" x2="465" y2="347"/>
    <line class="diagonal" x1="465" y1="50" x2="45"  y2="347"/>
    <line class="diagonal" x1="255" y1="50" x2="45"  y2="347"/>
    <line class="diagonal" x1="255" y1="50" x2="465" y2="347"/>
  </g>

  <!-- Corner dots — the 8 canonical corners of the two nested rectangles -->
  <g id="corner-dots">
    <!-- Verso text block -->
    <circle class="corner-dot" cx="119" cy="102" r="1.0"/>
    <circle class="corner-dot" cx="218" cy="102" r="1.0"/>
    <circle class="corner-dot" cx="119" cy="242" r="1.0"/>
    <circle class="corner-dot" cx="218" cy="242" r="1.0"/>
    <!-- Verso live area -->
    <circle class="corner-dot" cx="75"  cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="240" cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="75"  cy="304" r="1.2"/>
    <circle class="corner-dot" cx="240" cy="304" r="1.2"/>
    <!-- Recto text block -->
    <circle class="corner-dot" cx="292" cy="102" r="1.0"/>
    <circle class="corner-dot" cx="391" cy="102" r="1.0"/>
    <circle class="corner-dot" cx="292" cy="242" r="1.0"/>
    <circle class="corner-dot" cx="391" cy="242" r="1.0"/>
    <!-- Recto live area -->
    <circle class="corner-dot" cx="270" cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="435" cy="71"  r="1.2"/>
    <circle class="corner-dot" cx="270" cy="304" r="1.2"/>
    <circle class="corner-dot" cx="435" cy="304" r="1.2"/>
  </g>

  <!-- ====================  Derivation callout  ==================== -->
  <g id="derivation" transform="translate(478, 70)">
    <text x="0" y="0"  class="t-legend-h">Famille Van de Graaf</text>
    <text x="0" y="11" class="t-legend">rectangles similaires à</text>
    <text x="0" y="19" class="t-legend">la page, coins sur les</text>
    <text x="0" y="27" class="t-legend">diagonales.</text>

    <text x="0" y="44" class="t-legend-h">Choix utilisateur</text>
    <text x="0" y="55" class="t-legend">· texte (mesure)</text>
    <text x="0" y="63" class="t-legend">· live area</text>

    <text x="0" y="80" class="t-formula">Bandes dérivées</text>
    <text x="0" y="91" class="t-legend">outer gutter =</text>
    <text x="0" y="99" class="t-legend">  2·(x₂ᴸ − x₂ᵀ) = 44</text>
    <text x="0" y="107" class="t-legend">inner gutter = 22</text>
    <text x="0" y="115" class="t-legend">header band  = 31</text>
    <text x="0" y="123" class="t-legend">footer band  = 62</text>

    <text x="0" y="140" class="t-legend-h">Sidenote</text>
    <text x="0" y="151" class="t-legend">gap = innerGutter/4</text>
    <text x="0" y="159" class="t-formula">= 22/4 = 5.5 mm</text>
    <text x="0" y="170" class="t-legend">sidenote = outer</text>
    <text x="0" y="178" class="t-legend">  gutter − gap</text>
    <text x="0" y="186" class="t-formula">= 44 − 5.5 = 38.5</text>

    <text x="0" y="203" class="t-legend-h">Vrais blancs</text>
    <text x="0" y="213" class="t-legend">trim ext.  30 mm</text>
    <text x="0" y="221" class="t-legend">reliure    15 mm</text>
    <text x="0" y="229" class="t-legend">haut       21 mm</text>
    <text x="0" y="237" class="t-legend">bas        43 mm</text>
  </g>

  <!-- ====================  Swatch legend  ==================== -->
  <g id="swatches" transform="translate(20, 397)">
    <rect width="8" height="6" class="text-block"/>
    <text x="11" y="5" class="t-legend">bloc-texte</text>

    <rect x="60" width="8" height="6" class="live-area"/>
    <text x="71" y="5" class="t-legend">live area</text>

    <rect x="130" width="8" height="6" class="sidenote-area"/>
    <text x="141" y="5" class="t-legend">sidenote-area</text>

    <rect x="210" width="8" height="6" class="header-band"/>
    <text x="221" y="5" class="t-legend">header/footer</text>

    <rect x="290" width="8" height="6" class="gutter"/>
    <text x="301" y="5" class="t-legend">gutter blanc</text>

    <line x1="362" y1="0" x2="370" y2="6" class="diagonal"/>
    <text x="373" y="5" class="t-legend">diagonales VdG</text>
  </g>
</svg>
