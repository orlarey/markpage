<h1 class="doc-title">Charts — native SVG plots</h1><div class="preview-metadata"><div class="bold">Test Author</div><div class="bold">Test Org</div><div>2026-01-01</div></div>
<p>The <code>chart</code> fence draws a small SVG chart from inline data. The first
token picks the kind (<code>line</code> / <code>bar</code>); a quoted title may follow.</p>
