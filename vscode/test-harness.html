<!DOCTYPE html>
<!-- Dev harness: load the built webview bundle and feed it a sample document,
     to verify the markpage render pipeline (incl. phase-B MathJax/Mermaid) runs
     in a real browser. Not shipped. Open via a static server. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="media/preview.css">
</head>
<body>
  <div id="markpage-preview"></div>
  <!-- ESM module: attaches the message listener. -->
  <script type="module" src="dist/webview.js"></script>
  <!-- Runs after the module above (modules execute in order), then posts. -->
  <script type="module">
    const md = [
      '# markpage preview',
      '',
      '::: note',
      'A callout, with inline math $a^2 + b^2 = c^2$.',
      ':::',
      '',
      'Block math:',
      '',
      '$$\\int_0^1 x^2 \\, dx = \\frac{1}{3}$$',
      '',
      '```mermaid',
      'graph LR',
      '  A[Edit] --> B[Render]',
      '  B --> C[Preview]',
      '```',
      '',
      '```chart bar Sales',
      'Q1, 3',
      'Q2, 5',
      '```',
      '',
      '```category',
      'f : A -> B',
      'g : B -> C',
      '```',
      '',
      '```tree svg',
      'Root',
      '  Left',
      '  Right',
      '```',
      '',
      '```diff',
      '- old line',
      '+ new line',
      '```',
      '',
      'Term',
      ': its definition',
      '',
      '> A blockquote.',
      '',
      'A claim with a footnote.[^a]',
      '',
      '[^a]: The footnote body, at the end.',
    ].join('\n');
    window.dispatchEvent(new MessageEvent('message', { data: { type: 'render', md, baseUri: '' } }));
  </script>
</body>
</html>
